<nav aria-label="Page navigation">
  <ul class="pagination pagination-custom justify-content-end align-items-center mb-0 border-0">
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link border-0 fw-medium d-flex align-items-center gap-1" href="javascript:void(0)" (click)="prev()">
        <span class="material-icons" style="font-size: 16px;">arrow_back</span>
        Previous
      </a>
    </li>

    <li class="page-item" *ngFor="let p of pages" [class.active]="p === currentPage" [class.disabled]="p === '...'">
      <a class="page-link border-0 text-dark mx-1 rounded" href="javascript:void(0)" (click)="goToPage(p)">
        {{ p }}
      </a>
    </li>

    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <a class="page-link border-0 text-dark fw-medium d-flex align-items-center gap-1" href="javascript:void(0)" (click)="next()">
        Next
        <span class="material-icons" style="font-size: 16px;">arrow_forward</span>
      </a>
    </li>
  </ul>
</nav>
