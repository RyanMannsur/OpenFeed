<div class="container-fluid py-4">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold text-dark">Editar Artigo</h1>
  </div>

  <div class="alert alert-danger mb-4" *ngIf="loadError">
    {{ loadError }}
  </div>

  <div class="alert alert-light border mb-4" *ngIf="isLoading && !loadError">
    Carregando artigo...
  </div>

  <div class="row justify-content-center mb-4" *ngIf="!isLoading && !loadError">
    <div class="col-md-4">
      <app-select 
        label="Categoria" 
        placeholder="Selecione..." 
        [options]="categories" 
        labelKey="label" 
        valueKey="value"
        [(ngModel)]="category">
      </app-select>
    </div>
  </div>

  <div class="row justify-content-center" *ngIf="!isLoading && !loadError">
    <div class="col-md-5 mb-4">
      <input #imageInput type="file" accept="image/*" class="d-none" (change)="onImageSelected($event)">
      <div class="upload-placeholder d-flex justify-content-center align-items-center bg-light rounded cursor-pointer position-relative overflow-hidden" (click)="onImageClick(imageInput)">
        <img *ngIf="imagePreviewUrl" [src]="imagePreviewUrl" alt="Pré-visualização da imagem" class="w-100 h-100 object-fit-cover">
        <span *ngIf="!imagePreviewUrl" class="material-icons text-muted" style="font-size: 80px;">image</span>
      </div>
    </div>
    
    <div class="col-md-5 mb-4 d-flex flex-column">
      <div class="mb-3">
        <app-input type="text" placeholder="Título" [(ngModel)]="title"></app-input>
      </div>
      <div class="flex-grow-1">
        <app-input type="textarea" placeholder="Corpo do artigo..." [(ngModel)]="content" class="h-100 content-textarea"></app-input>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mt-4" *ngIf="!isLoading && !loadError">
    <div class="col-md-10 d-flex justify-content-end gap-3">
      <app-button variant="outline" (click)="onGoBack()">Voltar</app-button>
      <app-button variant="dark" (click)="openPublishModal()" [disabled]="isPublishing">Publicar</app-button>
    </div>
  </div>
</div>

<!-- Modal Publicar -->
<app-modal [isOpen]="isPublishModalOpen" title="Publicar?" text="Deseja publicar as alterações deste artigo?" (onClose)="closePublishModal()">
  <div *ngIf="publishError" class="alert alert-danger mb-3 py-2">
    {{ publishError }}
  </div>
  <div footer class="d-flex justify-content-end gap-2 w-100">
    <app-button variant="outline" (click)="closePublishModal()">Cancelar</app-button>
    <app-button variant="dark" (click)="confirmPublish()">Publicar</app-button>
  </div>
</app-modal>
