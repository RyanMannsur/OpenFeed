<header class="bg-white border-bottom px-4 d-flex justify-content-between align-items-center w-100 shadow-sm">
  <button class="btn btn-link text-dark p-0 text-decoration-none d-flex align-items-center" (click)="userClicked()" aria-label="Perfil do usuário">
    <span class="material-icons" style="font-size: 28px;">person_outline</span>
  </button>

  <div class="d-flex align-items-center justify-content-center">
    <img src="/img/logo.png" alt="OpenFeed Logo" class="logo">
  </div>

  <button class="btn btn-link text-dark p-0 text-decoration-none d-flex align-items-center" (click)="logoutClicked()" aria-label="Sair do sistema">
    <span class="material-icons" style="font-size: 28px;">logout</span>
  </button>
</header>
